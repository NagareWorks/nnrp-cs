name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify change set
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$base" "$head")

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          for path in "${changed_files[@]}"; do
            if [[ "$path" == "Packages/com.nnrp.client/README.md" ]]; then
              docs_only=false
              break
            fi

            if [[ "$path" == *.md ]] || [[ "$path" =~ ^(doc/|docs/|\.github/PULL_REQUEST_TEMPLATE/) ]] || [[ "$path" =~ ^\.github/[^/]+\.md$ ]]; then
              continue
            fi

            docs_only=false
            break
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  commit-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Enforce single-commit PR policy
        shell: bash
        run: |
          set -euo pipefail

          head_ref="${{ github.head_ref }}"
          base_ref="${{ github.base_ref }}"

          if [[ "$head_ref" =~ ^release/ ]] || [[ "$base_ref" =~ ^release/ ]]; then
            echo "Release/version branch PR detected; multi-commit history is allowed when needed."
            exit 0
          fi

          commit_count='${{ github.event.pull_request.commits }}'
          if [ "$commit_count" -ne 1 ]; then
            echo "Normal PRs from feature/fix/docs/chore branches must contain exactly one commit before review. Current PR has $commit_count commits. Squash the history before requesting review."
            exit 1
          fi

  build-test:
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Checkout nnrp-conformance action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nnrp-conformance
          path: nnrp-conformance-action
          fetch-depth: 1

      - name: Validate tracked UPM metadata
        shell: pwsh
        run: >-
          python scripts/build_upm_package.py
          --repo-root .
          --tracked-output Packages/com.nnrp.client
          --validate-tracked-metadata
          --repository-url https://github.com/${{ github.repository }}

      - name: Restore
        run: dotnet restore Nnrp.sln

      - name: Build
        run: dotnet build Nnrp.sln --configuration Release --no-restore

      - name: Test with coverage
        shell: pwsh
        run: |
          $coverageRoot = Join-Path $PWD "artifacts/test-results"
          $env:NNRP_CONFORMANCE_RECIPE_MANIFEST = Join-Path $PWD 'nnrp-conformance-action/protocol/nnrp-1-preview2/vectors/semantic-vectors.json'

          function Invoke-CoveredTest {
            param(
              [string]$ProjectPath,
              [string]$ArtifactName,
              [string]$IncludeFilter,
              [int]$Threshold = 0
            )

            $resultsDirectory = Join-Path $coverageRoot $ArtifactName
            $coverageDirectory = Join-Path $resultsDirectory "coverage"

            $arguments = @(
              "test",
              $ProjectPath,
              "--configuration", "Release",
              "--no-build",
              "--logger", "trx;LogFileName=$ArtifactName.trx",
              "--results-directory", $resultsDirectory,
              "/p:CollectCoverage=true",
              "/p:CoverletOutputFormat=cobertura",
              "/p:CoverletOutput=$coverageDirectory/",
              "/p:Include=$IncludeFilter"
            )

            if ($Threshold -gt 0) {
              $arguments += @(
                "/p:Threshold=$Threshold",
                "/p:ThresholdType=line",
                "/p:ThresholdStat=total"
              )
            }

            & dotnet @arguments
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

          Invoke-CoveredTest -ProjectPath "tests/Nnrp.Core.Tests/Nnrp.Core.Tests.csproj" -ArtifactName "Nnrp.Core.Tests" -IncludeFilter "[Nnrp.Core]*%2c[Nnrp.ConformanceExporter]*" -Threshold 90
          Invoke-CoveredTest -ProjectPath "tests/Nnrp.Client.Tests/Nnrp.Client.Tests.csproj" -ArtifactName "Nnrp.Client.Tests" -IncludeFilter "[Nnrp.Client]*" -Threshold 90
          Invoke-CoveredTest -ProjectPath "tests/Nnrp.Server.Tests/Nnrp.Server.Tests.csproj" -ArtifactName "Nnrp.Server.Tests" -IncludeFilter "[Nnrp.Server]*" -Threshold 90
          Invoke-CoveredTest -ProjectPath "tests/Nnrp.Transport.Tcp.Tests/Nnrp.Transport.Tcp.Tests.csproj" -ArtifactName "Nnrp.Transport.Tcp.Tests" -IncludeFilter "[Nnrp.Transport.Tcp]*" -Threshold 90
          Invoke-CoveredTest -ProjectPath "tests/Nnrp.NativeBridge.Tests/Nnrp.NativeBridge.Tests.csproj" -ArtifactName "Nnrp.NativeBridge.Tests" -IncludeFilter "[Nnrp.NativeBridge]*" -Threshold 90

      - name: Incremental line coverage gate
        shell: pwsh
        run: |
          $baseSha = ""
          $headSha = ""

          git fetch origin main --no-tags --depth=1

          if ("${{ github.event_name }}" -eq "pull_request") {
            $baseSha = "${{ github.event.pull_request.base.sha }}"
            $headSha = "${{ github.event.pull_request.head.sha }}"
          }
          elseif ("${{ github.event_name }}" -eq "push") {
            $baseSha = "${{ github.event.before }}"
            $headSha = "${{ github.sha }}"
          }

          $hasValidBaseSha = $false
          if (-not [string]::IsNullOrWhiteSpace($baseSha) -and $baseSha -ne "0000000000000000000000000000000000000000") {
            git cat-file -e "${baseSha}^{commit}" 2>$null
            $hasValidBaseSha = ($LASTEXITCODE -eq 0)
          }

          if (-not $hasValidBaseSha) {
            $baseSha = (git merge-base HEAD origin/main).Trim()
          }

          if ([string]::IsNullOrWhiteSpace($headSha)) {
            $headSha = (git rev-parse HEAD).Trim()
          }

          ./scripts/check_incremental_coverage.ps1 -BaseSha $baseSha -HeadSha $headSha -Threshold 90 -CoverageRoot (Join-Path $PWD "artifacts/test-results")

      - name: Upload test result artifacts
        if: always() && hashFiles('artifacts/test-results/**') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/
          if-no-files-found: error

      - name: Format check
        run: dotnet format Nnrp.sln --verify-no-changes --verbosity minimal

  conformance:
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout nnrp-conformance action
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/nnrp-conformance
          path: nnrp-conformance-action
          fetch-depth: 1

      - name: Resolve conformance baseline
        id: conformance-baseline
        shell: pwsh
        run: |
          $capabilityFiles = Get-ChildItem (Join-Path $PWD 'conformance') -Filter '*.capabilities.json'
          if ($capabilityFiles.Count -ne 1) {
            throw "Expected exactly one capability manifest under conformance/, found $($capabilityFiles.Count)."
          }

          $capabilityFile = $capabilityFiles[0]
          $capabilityManifest = Get-Content -Raw $capabilityFile.FullName | ConvertFrom-Json
          $protocolVersion = [string]$capabilityManifest.protocol_version
          if ([string]::IsNullOrWhiteSpace($protocolVersion)) {
            throw "Capability manifest does not declare protocol_version: $($capabilityFile.FullName)"
          }

          "protocol-version=$protocolVersion" >> $env:GITHUB_OUTPUT
          "capabilities-path=conformance/$($capabilityFile.Name)" >> $env:GITHUB_OUTPUT
          "artifact-name=nnrp-cs-conformance" >> $env:GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Nnrp.sln

      - name: Run suite-owned conformance action
        uses: ./nnrp-conformance-action/.github/actions/run-conformance
        with:
          protocol-version: ${{ steps.conformance-baseline.outputs.protocol-version }}
          capabilities-path: ${{ steps.conformance-baseline.outputs.capabilities-path }}
          working-directory: .
          artifact-name: ${{ steps.conformance-baseline.outputs.artifact-name }}
          sdk-vector-command: >-
            dotnet run --project tools/Nnrp.ConformanceExporter/Nnrp.ConformanceExporter.csproj --
            --protocol-version ${{ steps.conformance-baseline.outputs.protocol-version }}
            --recipe-manifest nnrp-conformance-action/protocol/${{ steps.conformance-baseline.outputs.protocol-version }}/vectors/semantic-vectors.json
            --output $env:NNRP_CONFORMANCE_SDK_VECTOR_OUTPUT

  docs-only:
    needs:
      - changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Skip heavy CI for docs-only change set
        run: echo "Docs-only change detected. Skipping restore, build, test, and format validation."

  required-checks:
    needs:
      - changes
      - commit-policy
      - build-test
      - conformance
      - docs-only
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Enforce required CI path
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && [ "${{ needs.commit-policy.result }}" != "success" ]; then
            echo "PR commit policy validation failed."
            exit 1
          fi

          if [ "${{ needs.changes.outputs.docs_only }}" = "true" ]; then
            if [ "${{ needs.docs-only.result }}" != "success" ]; then
              echo "Docs-only validation did not succeed."
              exit 1
            fi
            exit 0
          fi

          if [ "${{ needs.build-test.result }}" != "success" ]; then
            echo "Build, test, format, or incremental coverage validation failed."
            exit 1
          fi

          if [ "${{ needs.conformance.result }}" != "success" ]; then
            echo "Conformance validation failed."
            exit 1
          fi

