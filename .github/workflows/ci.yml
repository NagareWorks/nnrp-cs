name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify change set
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          else
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
          fi

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$base" "$head")

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          for path in "${changed_files[@]}"; do
            if [[ "$path" == *.md ]] || [[ "$path" =~ ^(doc/|docs/|\.github/PULL_REQUEST_TEMPLATE/) ]] || [[ "$path" =~ ^\.github/[^/]+\.md$ ]]; then
              continue
            fi

            docs_only=false
            break
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  build-test:
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Nnrp.sln

      - name: Build
        run: dotnet build Nnrp.sln --configuration Release --no-restore

      - name: Test with coverage
        shell: pwsh
        run: |
          dotnet test tests/Nnrp.Core.Tests/Nnrp.Core.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=Nnrp.Core.Tests.trx" --results-directory artifacts/test-results/Nnrp.Core.Tests /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=artifacts/test-results/Nnrp.Core.Tests/coverage/ /p:Include="[Nnrp.Core]*" /p:Threshold=90 /p:ThresholdType=line /p:ThresholdStat=total
          dotnet test tests/Nnrp.Client.Tests/Nnrp.Client.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=Nnrp.Client.Tests.trx" --results-directory artifacts/test-results/Nnrp.Client.Tests /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=artifacts/test-results/Nnrp.Client.Tests/coverage/ /p:Include="[Nnrp.Client]*" /p:Threshold=90 /p:ThresholdType=line /p:ThresholdStat=total
          dotnet test tests/Nnrp.Server.Tests/Nnrp.Server.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=Nnrp.Server.Tests.trx" --results-directory artifacts/test-results/Nnrp.Server.Tests /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=artifacts/test-results/Nnrp.Server.Tests/coverage/ /p:Include="[Nnrp.Server]*" /p:Threshold=90 /p:ThresholdType=line /p:ThresholdStat=total
          dotnet test tests/Nnrp.Transport.Tcp.Tests/Nnrp.Transport.Tcp.Tests.csproj --configuration Release --no-build --logger "trx;LogFileName=Nnrp.Transport.Tcp.Tests.trx" --results-directory artifacts/test-results/Nnrp.Transport.Tcp.Tests /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput=artifacts/test-results/Nnrp.Transport.Tcp.Tests/coverage/ /p:Include="[Nnrp.Transport.Tcp]*" /p:Threshold=90 /p:ThresholdType=line /p:ThresholdStat=total

      - name: Upload test result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results/
          if-no-files-found: error

      - name: Format check
        run: dotnet format Nnrp.sln --verify-no-changes --verbosity minimal

  docs-only:
    needs:
      - changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Skip heavy CI for docs-only change set
        run: echo "Docs-only change detected. Skipping restore, build, test, and format validation."

