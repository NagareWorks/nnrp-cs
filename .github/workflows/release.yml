name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify change set
        id: classify
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mapfile -t changed_files < <(git diff --name-only "$base" "$head")

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "docs_only=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          docs_only=true
          for path in "${changed_files[@]}"; do
            if [[ "$path" == *.md ]] || [[ "$path" =~ ^(doc/|docs/|\.github/PULL_REQUEST_TEMPLATE/) ]] || [[ "$path" =~ ^\.github/[^/]+\.md$ ]]; then
              continue
            fi

            docs_only=false
            break
          done

          echo "docs_only=$docs_only" >> "$GITHUB_OUTPUT"

  native-bridge:
    needs:
      - changes
    if: needs.changes.outputs.docs_only != 'true'
    name: Native bridge (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            build_kind: native
            binary_path: native/nnrp_quic_bridge/target/release/nnrp_quic_bridge.dll
          - os: ubuntu-latest
            rid: linux-x64
            build_kind: native
            binary_path: native/nnrp_quic_bridge/target/release/libnnrp_quic_bridge.so
          - os: ubuntu-latest
            rid: osx-x64
            build_kind: zig
            target: x86_64-apple-darwin
            binary_path: native/nnrp_quic_bridge/target/x86_64-apple-darwin/release/libnnrp_quic_bridge.dylib
          - os: ubuntu-latest
            rid: osx-arm64
            build_kind: zig
            target: aarch64-apple-darwin
            binary_path: native/nnrp_quic_bridge/target/aarch64-apple-darwin/release/libnnrp_quic_bridge.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        if: matrix.build_kind == 'native'
        uses: dtolnay/rust-toolchain@stable

      - name: Build native bridge
        if: matrix.build_kind == 'native'
        shell: pwsh
        run: |
          cargo build --manifest-path native/nnrp_quic_bridge/Cargo.toml --release
          $destination = Join-Path 'artifacts/native' '${{ matrix.rid }}'
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          Copy-Item '${{ matrix.binary_path }}' $destination

      - name: Build native bridge with zig cross toolchain
        if: matrix.build_kind == 'zig'
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            ghcr.io/rust-cross/cargo-zigbuild:latest \
            cargo zigbuild --manifest-path native/nnrp_quic_bridge/Cargo.toml --release --target ${{ matrix.target }}

          mkdir -p "artifacts/native/${{ matrix.rid }}"
          cp "${{ matrix.binary_path }}" "artifacts/native/${{ matrix.rid }}/"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}/
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package managed SDK and UPM bundle
    runs-on: windows-latest
    needs:
      - changes
      - native-bridge
    if: needs.changes.outputs.docs_only != 'true'
    environment: release
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = dotnet msbuild src/Nnrp.Core/Nnrp.Core.csproj -nologo -getProperty:Version
          $version = $version.Trim()
          "value=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/native-download

      - name: Normalize native artifact layout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/native | Out-Null
          Get-ChildItem artifacts/native-download -Directory | ForEach-Object {
            $rid = $_.Name -replace '^native-', ''
            $destination = Join-Path 'artifacts/native' $rid
            New-Item -ItemType Directory -Force -Path $destination | Out-Null
            Get-ChildItem $_.FullName -File | Copy-Item -Destination $destination -Force
          }

      - name: Restore
        run: dotnet restore Nnrp.sln

      - name: Build
        run: dotnet build Nnrp.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test Nnrp.sln --configuration Release --no-build

      - name: Pack NuGet packages
        run: dotnet pack Nnrp.sln --configuration Release --no-build --output artifacts/packages

      - name: Build UPM package
        run: >-
          python scripts/build_upm_package.py
          --repo-root .
          --configuration Release
          --native-root artifacts/native
          --output artifacts/upm/com.nnrp.client
          --repository-url https://github.com/${{ github.repository }}

      - name: Bundle release artifacts
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.value }}'
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $upmZip = Join-Path (Resolve-Path 'artifacts').Path ("com.nnrp.client-{0}.zip" -f $version)
          if (Test-Path $upmZip) {
            Remove-Item $upmZip -Force
          }
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Resolve-Path 'artifacts/upm/com.nnrp.client'), $upmZip)

          Push-Location (Resolve-Path 'artifacts/upm/com.nnrp.client')
          try {
            $packName = (npm pack --silent).Trim()
          }
          finally {
            Pop-Location
          }

          $upmTgz = Join-Path (Resolve-Path 'artifacts').Path ("com.nnrp.client-{0}.tgz" -f $version)
          if (Test-Path $upmTgz) {
            Remove-Item $upmTgz -Force
          }
          Move-Item (Join-Path (Resolve-Path 'artifacts/upm/com.nnrp.client').Path $packName) $upmTgz

          $nugetZip = Join-Path (Resolve-Path 'artifacts').Path ("nnrp-cs-nuget-{0}.zip" -f $version)
          if (Test-Path $nugetZip) {
            Remove-Item $nugetZip -Force
          }
          Compress-Archive -Path artifacts/packages/*.nupkg -DestinationPath $nugetZip -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-cs-release-${{ steps.version.outputs.value }}
          path: |
            artifacts/nnrp-cs-nuget-${{ steps.version.outputs.value }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.value }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.value }}.tgz
          if-no-files-found: error
          retention-days: 14

      - name: Create git tag
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          git fetch --tags
          $tag = 'v${{ steps.version.outputs.value }}'
          $existing = git tag --list $tag
          if (-not $existing) {
            git tag $tag
            git push origin $tag
          }

      - name: Publish GitHub release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.value }}
          name: nnrp-cs v${{ steps.version.outputs.value }}
          files: |
            artifacts/nnrp-cs-nuget-${{ steps.version.outputs.value }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.value }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.value }}.tgz

      - name: Publish NuGet packages to GitHub Packages
        if: github.ref == 'refs/heads/main'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --name github --username ${{ github.actor }} --password $env:GITHUB_TOKEN --store-password-in-clear-text
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source github --api-key $env:GITHUB_TOKEN --skip-duplicate
          }

      - name: NuGet login (OIDC to temporary API key)
        if: github.ref == 'refs/heads/main' && vars.NUGET_USER != ''
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}

      - name: Publish NuGet packages to nuget.org via Trusted Publishing
        if: github.ref == 'refs/heads/main' && vars.NUGET_USER != ''
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

  docs-only:
    needs:
      - changes
    if: needs.changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Skip release workflow for docs-only change set
        run: echo "Docs-only change detected. Skipping native build, package, and release publication."