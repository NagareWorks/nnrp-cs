name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to release when running manually
        required: true
        default: main
      publish_github_release:
        description: Publish or update the GitHub Release
        required: true
        type: boolean
        default: true
      publish_github_packages:
        description: Publish NuGet packages to GitHub Packages
        required: true
        type: boolean
        default: false
      publish_nuget:
        description: Publish NuGet packages to nuget.org
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:

  native-bridge:
    name: Native bridge (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            build_kind: native
            binary_path: native/nnrp_quic_bridge/target/release/nnrp_quic_bridge.dll
          - os: ubuntu-latest
            rid: linux-x64
            build_kind: native
            binary_path: native/nnrp_quic_bridge/target/release/libnnrp_quic_bridge.so
          - os: ubuntu-latest
            rid: osx-x64
            build_kind: zig
            target: x86_64-apple-darwin
            binary_path: native/nnrp_quic_bridge/target/x86_64-apple-darwin/release/libnnrp_quic_bridge.dylib
          - os: ubuntu-latest
            rid: osx-arm64
            build_kind: zig
            target: aarch64-apple-darwin
            binary_path: native/nnrp_quic_bridge/target/aarch64-apple-darwin/release/libnnrp_quic_bridge.dylib

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup Rust
        if: matrix.build_kind == 'native'
        uses: dtolnay/rust-toolchain@stable

      - name: Build native bridge
        if: matrix.build_kind == 'native'
        shell: pwsh
        run: |
          cargo build --manifest-path native/nnrp_quic_bridge/Cargo.toml --release
          $destination = Join-Path 'artifacts/native' '${{ matrix.rid }}'
          New-Item -ItemType Directory -Force -Path $destination | Out-Null
          Copy-Item '${{ matrix.binary_path }}' $destination

      - name: Build native bridge with zig cross toolchain
        if: matrix.build_kind == 'zig'
        shell: bash
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/io" \
            -w /io \
            ghcr.io/rust-cross/cargo-zigbuild:latest \
            cargo zigbuild --manifest-path native/nnrp_quic_bridge/Cargo.toml --release --target ${{ matrix.target }}

          mkdir -p "artifacts/native/${{ matrix.rid }}"
          cp "${{ matrix.binary_path }}" "artifacts/native/${{ matrix.rid }}/"

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/native/${{ matrix.rid }}/
          if-no-files-found: error
          retention-days: 14

  package:
    name: Package managed SDK and UPM bundle
    runs-on: windows-latest
    needs: native-bridge
    environment: release
    permissions:
      contents: write
      packages: write
      id-token: write
    env:
      GITHUB_PACKAGES_PUBLISH_MODE: ${{ vars.GITHUB_PACKAGES_PUBLISH_MODE }}
      NUGET_PUBLISH_MODE: ${{ vars.NUGET_PUBLISH_MODE }}
      NUGET_USER: ${{ vars.NUGET_USER }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $releaseVersion = dotnet msbuild src/Nnrp.Core/Nnrp.Core.csproj -nologo -getProperty:ReleaseVersion
          $releaseVersion = $releaseVersion.Trim()
          $packageVersion = $releaseVersion
          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "release_version=$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "tag_name=v$releaseVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Validate pushed tag
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail

          expected_tag="${{ steps.version.outputs.tag_name }}"
          actual_tag="${{ github.ref_name }}"

          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "Release tag mismatch: expected $expected_tag but workflow was triggered by $actual_tag."
            exit 1
          fi
      - name: Create git tag
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          git fetch --tags
          $tag = '${{ steps.version.outputs.tag_name }}'
          $existing = git tag --list $tag
          if (-not $existing) {
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git tag $tag
            git push origin $tag
          }

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: artifacts/native-download

      - name: Normalize native artifact layout
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts/native | Out-Null
          Get-ChildItem artifacts/native-download -Directory | ForEach-Object {
            $rid = $_.Name -replace '^native-', ''
            $destination = Join-Path 'artifacts/native' $rid
            New-Item -ItemType Directory -Force -Path $destination | Out-Null
            Get-ChildItem $_.FullName -File | Copy-Item -Destination $destination -Force
          }

      - name: Restore
        run: dotnet restore Nnrp.sln

      - name: Build
        run: >-
          dotnet build Nnrp.sln --configuration Release --no-restore
          -p:Version=${{ steps.version.outputs.package_version }}
          -p:PackageVersion=${{ steps.version.outputs.package_version }}
          -p:VersionSuffix=

      - name: Test
        run: dotnet test Nnrp.sln --configuration Release --no-build

      - name: Pack NuGet packages
        run: >-
          dotnet pack Nnrp.sln --configuration Release --no-build --output artifacts/packages
          -p:Version=${{ steps.version.outputs.package_version }}
          -p:PackageVersion=${{ steps.version.outputs.package_version }}
          -p:VersionSuffix=

      - name: Build UPM package
        run: >-
          python scripts/build_upm_package.py
          --repo-root .
          --configuration Release
          --native-root artifacts/native
          --output artifacts/upm/com.nnrp.client
          --repository-url https://github.com/${{ github.repository }}

      - name: Bundle release artifacts
        shell: pwsh
        run: |
          $version = '${{ steps.version.outputs.package_version }}'
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $upmZip = Join-Path (Resolve-Path 'artifacts').Path ("com.nnrp.client-{0}.zip" -f $version)
          if (Test-Path $upmZip) {
            Remove-Item $upmZip -Force
          }
          [System.IO.Compression.ZipFile]::CreateFromDirectory((Resolve-Path 'artifacts/upm/com.nnrp.client'), $upmZip)

          Push-Location (Resolve-Path 'artifacts/upm/com.nnrp.client')
          try {
            $packName = (npm pack --silent).Trim()
          }
          finally {
            Pop-Location
          }

          $upmTgz = Join-Path (Resolve-Path 'artifacts').Path ("com.nnrp.client-{0}.tgz" -f $version)
          if (Test-Path $upmTgz) {
            Remove-Item $upmTgz -Force
          }
          Move-Item (Join-Path (Resolve-Path 'artifacts/upm/com.nnrp.client').Path $packName) $upmTgz

          $nugetZip = Join-Path (Resolve-Path 'artifacts').Path ("nnrp-cs-nuget-{0}.zip" -f $version)
          if (Test-Path $nugetZip) {
            Remove-Item $nugetZip -Force
          }
          Compress-Archive -Path artifacts/packages/*.nupkg -DestinationPath $nugetZip -Force

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nnrp-cs-release-${{ steps.version.outputs.package_version }}
          path: |
            artifacts/nnrp-cs-nuget-${{ steps.version.outputs.package_version }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.package_version }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.package_version }}.tgz
          if-no-files-found: error
          retention-days: 14

      - name: Publish GitHub release
        if: github.event_name == 'push' || inputs.publish_github_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: nnrp-cs v${{ steps.version.outputs.package_version }}
          files: |
            artifacts/nnrp-cs-nuget-${{ steps.version.outputs.package_version }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.package_version }}.zip
            artifacts/com.nnrp.client-${{ steps.version.outputs.package_version }}.tgz

      - name: Publish NuGet packages to GitHub Packages
        if: (github.event_name == 'push' || inputs.publish_github_packages) && env.GITHUB_PACKAGES_PUBLISH_MODE == 'enabled'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --name github --username ${{ github.actor }} --password $env:GITHUB_TOKEN --store-password-in-clear-text
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source github --api-key $env:GITHUB_TOKEN --skip-duplicate
          }

      - name: NuGet login (OIDC to temporary API key)
        if: (github.event_name == 'push' || inputs.publish_nuget) && env.NUGET_PUBLISH_MODE == 'trusted' && env.NUGET_USER != ''
        id: nuget_login
        uses: NuGet/login@v1
        with:
          user: ${{ env.NUGET_USER }}

      - name: Publish NuGet packages to nuget.org via Trusted Publishing
        if: (github.event_name == 'push' || inputs.publish_nuget) && env.NUGET_PUBLISH_MODE == 'trusted' && env.NUGET_USER != ''
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ steps.nuget_login.outputs.NUGET_API_KEY }}
        run: |
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }

      - name: Publish NuGet packages to nuget.org via API token
        if: (github.event_name == 'push' || inputs.publish_nuget) && env.NUGET_PUBLISH_MODE == 'token' && env.NUGET_API_KEY != ''
        shell: pwsh
        run: |
          Get-ChildItem artifacts/packages/*.nupkg | ForEach-Object {
            dotnet nuget push $_.FullName --source https://api.nuget.org/v3/index.json --api-key $env:NUGET_API_KEY --skip-duplicate
          }